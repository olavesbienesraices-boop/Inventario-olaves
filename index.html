<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olaves Bienes Raíces – Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --indigo:   #3D3D8F;
    --indigo2:  #2E2E6E;
    --indigo3:  #1E1E4E;
    --indigo-lt:#6B6BBF;
    --black:    #111111;
    --white:    #FFFFFF;
    --cream:    #F7F6FB;
    --cream2:   #EEEDF7;
    --red:      #B03030;
    --green:    #1A6B3C;
    --grey:     #7A7A9A;
    --border:   rgba(61,61,143,0.18);
    --shadow:   0 8px 32px rgba(30,30,78,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--black); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--indigo3) 0%, var(--indigo2) 60%, var(--indigo) 100%);
    padding: 12px 40px;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(30,30,78,0.35);
    border-bottom: 3px solid var(--indigo-lt);
  }
  .logo-area { display: flex; align-items: center; cursor: pointer; user-select: none; }
  .logo-area img { height: 60px; width: auto; transition: opacity .2s; }
  .logo-area:hover img { opacity: .85; }
  .header-stats { display: flex; gap: 28px; align-items: center; }
  .stat-chip { text-align: center; }
  .stat-chip .num { display: block; font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: #fff; line-height: 1; }
  .stat-chip .lbl { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,.5); margin-top: 2px; }
  .stat-divider { width: 1px; height: 36px; background: rgba(255,255,255,.2); }

  /* ── FILTERS ── */
  .filters-bar {
    background: var(--white); padding: 12px 40px;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 95px; z-index: 90;
    box-shadow: 0 2px 12px rgba(30,30,78,0.07);
  }
  .filter-btn { border: 1.5px solid var(--border); background: transparent; color: var(--indigo); font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 7px 16px; border-radius: 2px; cursor: pointer; transition: all .18s; }
  .filter-btn:hover, .filter-btn.active { background: var(--indigo); color: var(--white); border-color: var(--indigo); }
  .search-box { margin-left: auto; border: 1.5px solid var(--border); border-radius: 2px; display: flex; align-items: center; overflow: hidden; background: var(--cream); }
  .search-box input { border: none; outline: none; background: transparent; padding: 7px 14px; font-family: 'Montserrat', sans-serif; font-size: 12px; color: var(--black); width: 200px; }
  .search-box input::placeholder { color: var(--grey); }

  /* ── GRID ── */
  .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 22px; padding: 30px 40px; max-width: 1400px; margin: 0 auto; }

  /* ── CARD ── */
  .prop-card { background: var(--white); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: transform .25s, box-shadow .25s; position: relative; animation: fadeUp .4s ease both; cursor: pointer; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .prop-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
  .prop-card.sold { opacity: .72; }
  .prop-card.sold .card-img-wrap::after { content:'VENDIDA'; position:absolute; inset:0; background:rgba(176,48,48,.72); display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:700; letter-spacing:4px; color:var(--white); }
  .prop-card.new-prop .card-img-wrap::before { content:'NUEVA'; position:absolute; top:10px; left:10px; background:var(--green); color:var(--white); font-size:9px; font-weight:700; letter-spacing:2px; padding:4px 10px; border-radius:2px; z-index:2; }
  .card-img-wrap { position:relative; height:195px; overflow:hidden; background: linear-gradient(135deg,var(--indigo3),var(--indigo)); }
  .card-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform .4s; }
  .prop-card:hover .card-img-wrap img { transform:scale(1.04); }
  .no-photo { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(255,255,255,.35); gap:8px; }
  .no-photo span { font-size:9px; letter-spacing:2px; text-transform:uppercase; }

  .card-body { padding: 15px 17px 16px; border-top: 3px solid var(--indigo); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:3px; }
  .card-title { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:700; color:var(--black); line-height:1.2; flex:1; margin-right:8px; }
  .card-price { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:700; color:var(--green); white-space:nowrap; }
  .prop-card.sold .card-price { color:var(--red); text-decoration:line-through; }
  .card-location { font-size:10px; font-weight:400; letter-spacing:1px; color:var(--grey); text-transform:uppercase; margin-bottom:9px; }
  .card-specs { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:9px; }
  .spec-tag { background:var(--cream2); border:1px solid var(--border); font-size:10px; font-weight:500; padding:3px 8px; border-radius:2px; color:var(--indigo); }
  .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:9px; padding-top:9px; border-top:1px solid var(--border); font-size:10px; color:var(--grey); }
  .sold-info { font-size:10px; color:var(--red); font-weight:600; }
  .commission-badge { background:rgba(61,61,143,.1); color:var(--indigo); border:1px solid var(--indigo); font-size:9px; font-weight:600; letter-spacing:1px; padding:3px 8px; border-radius:2px; }

  /* View more hint */
  .card-view-more { display:flex; align-items:center; justify-content:center; gap:5px; margin-top:9px; padding-top:9px; border-top:1px dashed var(--border); font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--indigo-lt); transition:color .2s; }
  .prop-card:hover .card-view-more { color:var(--indigo); }

  .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--grey); }

  /* ══ PROPERTY DETAIL MODAL ══ */
  #detail-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(20,20,60,.78); z-index:800;
    backdrop-filter:blur(6px);
    align-items:center; justify-content:center;
    animation:fadeIn .2s;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .detail-panel {
    background:var(--white); width:92%; max-width:720px; max-height:88vh;
    border-radius:6px; overflow:hidden; display:flex; flex-direction:column;
    box-shadow:0 24px 80px rgba(20,20,60,.45);
  }

  .detail-img-strip { position:relative; height:240px; overflow:hidden; background:linear-gradient(135deg,var(--indigo3),var(--indigo)); flex-shrink:0; }
  .detail-img-strip img { width:100%; height:100%; object-fit:cover; }
  .detail-img-strip .detail-close { position:absolute; top:12px; right:14px; background:rgba(0,0,0,.45); border:none; color:var(--white); font-size:18px; width:32px; height:32px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
  .detail-img-strip .detail-close:hover { background:rgba(0,0,0,.7); }

  /* Image gallery nav */
  .detail-nav { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); display:flex; gap:6px; }
  .detail-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.45); cursor:pointer; transition:background .2s; border:none; }
  .detail-dot.active { background:var(--white); }

  .detail-body { overflow-y:auto; padding:22px 26px; flex:1; }
  .detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
  .detail-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:700; color:var(--black); line-height:1.15; flex:1; margin-right:12px; }
  .detail-price { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:700; color:var(--green); white-space:nowrap; }
  .detail-sold .detail-price { color:var(--red); text-decoration:line-through; }
  .detail-location { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--grey); margin-bottom:16px; }

  .detail-specs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .detail-spec { background:var(--cream2); border:1px solid var(--border); font-size:11px; font-weight:600; padding:5px 13px; border-radius:2px; color:var(--indigo); letter-spacing:.3px; }

  .detail-section { margin-bottom:16px; }
  .detail-section-title { font-size:9px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--indigo); margin-bottom:6px; padding-bottom:5px; border-bottom:1px solid var(--border); }
  .detail-section p { font-size:13px; line-height:1.7; color:#333; }

  /* Texto recomendado */
  .detail-recomendado { background:var(--cream2); border-left:4px solid var(--indigo); border-radius:0 4px 4px 0; padding:14px 16px; font-size:13px; line-height:1.75; color:#333; white-space:pre-line; }

  .detail-meta { display:flex; gap:20px; flex-wrap:wrap; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
  .detail-meta-item { font-size:10px; color:var(--grey); }
  .detail-meta-item strong { display:block; font-size:11px; color:var(--black); font-weight:600; margin-bottom:1px; }

  /* ══ ADMIN ══ */
  #admin-overlay { display:none; position:fixed; inset:0; background:rgba(20,20,60,.82); z-index:1000; backdrop-filter:blur(6px); align-items:center; justify-content:center; }
  .admin-panel { background:var(--white); width:90%; max-width:700px; max-height:90vh; border-radius:6px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 24px 80px rgba(20,20,60,.45); }
  .admin-header { background:linear-gradient(135deg,var(--indigo3),var(--indigo)); padding:14px 22px; display:flex; align-items:center; justify-content:space-between; }
  .admin-header img { height:36px; }
  .admin-header h2 { font-family:'Cormorant Garamond',serif; color:var(--white); font-size:18px; font-weight:700; letter-spacing:1px; }
  .admin-close { background:none; border:none; color:rgba(255,255,255,.7); font-size:22px; cursor:pointer; padding:2px 6px; border-radius:3px; transition:color .2s; }
  .admin-close:hover { color:var(--white); }
  .admin-tabs { display:flex; border-bottom:2px solid var(--border); background:var(--cream); }
  .admin-tab { padding:11px 18px; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--grey); cursor:pointer; border:none; background:none; font-family:'Montserrat',sans-serif; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .18s; }
  .admin-tab.active { color:var(--indigo); border-bottom-color:var(--indigo); }
  .admin-body { flex:1; overflow-y:auto; padding:20px; }
  .login-form { display:flex; flex-direction:column; gap:14px; max-width:300px; margin:20px auto; }
  .login-form h3 { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--indigo); text-align:center; margin-bottom:4px; }
  .form-group { display:flex; flex-direction:column; gap:4px; }
  .form-group label { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--grey); }
  .form-group input,.form-group select,.form-group textarea { border:1.5px solid var(--border); border-radius:3px; padding:8px 11px; font-family:'Montserrat',sans-serif; font-size:13px; color:var(--black); background:var(--cream); outline:none; transition:border-color .18s; }
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--indigo); background:var(--white); }
  .form-group textarea { resize:vertical; min-height:70px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .btn-primary { background:var(--indigo); color:var(--white); border:2px solid var(--indigo); font-family:'Montserrat',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:10px 22px; border-radius:3px; cursor:pointer; transition:all .18s; width:100%; }
  .btn-primary:hover { background:var(--indigo2); border-color:var(--indigo2); }
  .btn-danger { background:var(--red); color:var(--white); border:2px solid var(--red); font-family:'Montserrat',sans-serif; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:6px 12px; border-radius:3px; cursor:pointer; }
  .btn-secondary { background:transparent; color:var(--indigo); border:1.5px solid var(--border); font-family:'Montserrat',sans-serif; font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; padding:6px 12px; border-radius:3px; cursor:pointer; transition:all .18s; }
  .btn-secondary:hover { border-color:var(--indigo); background:var(--cream2); }

  /* Photo upload */
  .photo-drop { border:2px dashed var(--border); border-radius:4px; padding:20px; text-align:center; cursor:pointer; transition:all .18s; background:var(--cream); position:relative; }
  .photo-drop:hover,.photo-drop.dragover { border-color:var(--indigo); background:var(--cream2); }
  .photo-drop input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .photo-drop .drop-icon { font-size:28px; margin-bottom:7px; display:block; }
  .photo-drop p { font-size:11px; color:var(--grey); line-height:1.6; }
  .photo-drop p strong { color:var(--indigo); }
  .photo-preview { margin-top:10px; display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .photo-thumb { position:relative; aspect-ratio:1; border-radius:3px; overflow:hidden; border:1.5px solid var(--border); }
  .photo-thumb img { width:100%; height:100%; object-fit:cover; }
  .photo-thumb .remove-photo { position:absolute; top:3px; right:3px; background:var(--red); color:var(--white); border:none; border-radius:50%; width:18px; height:18px; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  /* Admin list */
  .prop-list-item { display:flex; align-items:center; gap:10px; padding:10px; border:1px solid var(--border); border-radius:4px; margin-bottom:6px; background:var(--cream); transition:background .15s; }
  .prop-list-item:hover { background:var(--white); }
  .prop-list-thumb { width:46px; height:46px; border-radius:3px; object-fit:cover; background:var(--indigo3); flex-shrink:0; }
  .prop-list-info { flex:1; min-width:0; }
  .prop-list-name { font-size:12px; font-weight:600; color:var(--black); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prop-list-price { font-size:11px; color:var(--green); margin-top:2px; }
  .prop-list-item.sold .prop-list-price { color:var(--red); text-decoration:line-through; }
  .prop-list-actions { display:flex; gap:5px; flex-shrink:0; }
  .status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .status-dot.available { background:var(--green); }
  .status-dot.sold { background:var(--red); }
  .status-dot.new { background:var(--indigo); }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--indigo); color:var(--white); padding:11px 26px; border-radius:4px; font-size:11px; font-weight:600; letter-spacing:1px; pointer-events:none; opacity:0; transition:all .3s; z-index:9999; border:1px solid var(--indigo-lt); white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  footer { text-align:center; padding:22px; font-size:9px; letter-spacing:2.5px; color:var(--grey); text-transform:uppercase; border-top:1px solid var(--border); margin-top:16px; }

  @media (max-width:640px) {
    header { padding:10px 16px; }
    .header-stats { display:none; }
    .catalog-grid { padding:14px 12px; gap:14px; }
    .filters-bar { padding:10px 14px; top:84px; }
    .search-box input { width:120px; }
    .detail-panel { max-height:95vh; }
    .detail-img-strip { height:190px; }
  }
</style>
</head>

    <div id="admin-login" class="admin-body">
      <div class="login-form">
        <h3>Acceso Administrador</h3>
        <div class="form-group"><label>Contraseña</label><input type="password" id="admin-pwd" placeholder="••••••••"></div>
        <div id="login-error" style="color:var(--red);font-size:11px;text-align:center;display:none;">Contraseña incorrecta</div>
        <button class="btn-primary" onclick="adminLogin()">Entrar</button>
      </div>
    </div>
    <div id="admin-dashboard" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="add">➕ Agregar</button>
        <button class="admin-tab" data-tab="list">📋 Propiedades</button>
      </div>
      <div id="tab-add" class="admin-body">
        <div style="display:grid;gap:12px;">
          <div class="form-row">
            <div class="form-group"><label>Modelo / Nombre *</label><input type="text" id="f-name" placeholder="Ej. CELTA – Punta Vela"></div>
            <div class="form-group"><label>Precio *</label><input type="text" id="f-price" placeholder="$0,000,000"></div>
          </div>
          <div class="form-group"><label>Ubicación / Fraccionamiento</label><input type="text" id="f-location" placeholder="Blvd. Tecnológico..."></div>
          <div class="form-row">
            <div class="form-group"><label>Recámaras</label><input type="text" id="f-beds" placeholder="3"></div>
            <div class="form-group"><label>Baños</label><input type="text" id="f-baths" placeholder="2"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>M² Construcción</label><input type="text" id="f-sqm" placeholder="120 m²"></div>
            <div class="form-group"><label>Comisión</label><input type="text" id="f-commission" placeholder="$10,000"></div>
          </div>
          <div class="form-group"><label>Forma de Pago</label><input type="text" id="f-payment" placeholder="Crédito INFONAVIT, contado..."></div>
          <div class="form-group"><label>Observaciones</label><textarea id="f-notes" placeholder="Características de la propiedad…"></textarea></div>
          <div class="form-group">
            <label>📋 Texto Recomendado (descripción de venta)</label>
            <textarea id="f-recomendado" placeholder="Escribe aquí el texto que aparecerá al abrir la propiedad. Ejemplo: ¡Excelente oportunidad en Punta Vela! Casa con acabados de lujo, cocina integral, patio amplio…" style="min-height:100px;"></textarea>
          </div>
          <div class="form-group"><label>Fecha de Ingreso</label><input type="date" id="f-date"></div>
          <div class="form-group">
            <label>📷 Fotos de la Propiedad</label>
            <div class="photo-drop" id="photo-drop">
              <input type="file" id="photo-input" accept="image/*" multiple>
              <span class="drop-icon">🏠</span>
              <p><strong>Arrastra imágenes aquí</strong><br>o toca para seleccionar<br><small>JPG, PNG — máx 5 fotos</small></p>
            </div>
            <div class="photo-preview" id="photo-preview"></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="f-isnew" checked style="width:16px;height:16px;accent-color:var(--indigo);">
            <label for="f-isnew" style="font-size:11px;font-weight:600;color:var(--black);letter-spacing:.5px;cursor:pointer;">Marcar como <span style="color:var(--green);">Nueva</span> (muestra etiqueta verde)</label>
          </div>
          <button class="btn-primary" onclick="addProperty()">Guardar Propiedad</button>
        </div>
      </div>
      <div id="tab-list" class="admin-body" style="display:none;">
        <div id="admin-prop-list"></div>
      </div>

    </div>

</div>

<div class="toast" id="toast"></div>

<script>
const JSONBIN_API_KEY = '$2a$10$YoFKW2dJ9tOJnKoh36xzUOu9CZ4n8HUk5aJhESlolCtVHcgxv1Hni';
const ADMIN_PWD       = 'Olaves2026';
let   BIN_ID          = localStorage.getItem('olaves_bin_id') || null;

const DEFAULT_PROPS = [
  {id:'p001',name:'MIRABELL – Punta Vela',location:'Punta Vela',price:'$2,820,000',beds:'3',baths:'2',sqm:'',commission:'',payment:'',notes:'',recomendado:'',status:'available',isNew:false,dateIn:'2025-03-27',dateSold:'',buyer:''},

  {id:'p011',name:'Col. Unidad Frontera 2',location:'Unidad Frontera',price:'$3,350,000',beds:'3',baths:'2',sqm:'',commission:'$20,000',payment:'',notes:'',recomendado:'',status:'available',isNew:false,dateIn:'2025-11-01',dateSold:'',buyer:''},
  {id:'p012',name:'Las Haciendas – Hacienda Río Florido',location:'Las Haciendas',price:'$1,300,000',beds:'2',baths:'1',sqm:'',commission:'$7,000',payment:'',notes:'',recomendado:'',status:'available',isNew:true,dateIn:'2025-12-11',dateSold:'',buyer:''},
  {id:'p013',name:'Sierra Vista – Hacienda Romano',location:'Sierra Vista',price:'$1,290,000',beds:'2',baths:'1',sqm:'',commission:'$10,000',payment:'',notes:'',recomendado:'',status:'available',isNew:true,dateIn:'2026-01-05',dateSold:'',buyer:''},
  {id:'p014',name:'Las Haciendas – Hacienda de Batopilas',location:'Las Haciendas',price:'$1,400,000',beds:'2',baths:'1',sqm:'',commission:'$10,000',payment:'',notes:'',recomendado:'',status:'sold',isNew:false,dateIn:'2026-05-09',dateSold:'2026-05-10',buyer:'María Belén Priego León'},
];

let properties=[], photos={}, currentFilter='all', sellTargetId=null, pendingPhotos=[], currentDetailId=null, detailImgIdx=0;

async function loadFromBin(){
  if(!BIN_ID){properties=DEFAULT_PROPS;renderAll();return;}
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':JSONBIN_API_KEY}});
    if(!r.ok)throw new Error();
    const d=await r.json();
    properties=(d.record.properties||DEFAULT_PROPS).map(p=>({recomendado:'',isNew:p.isNew||false,...p}));
    photos=d.record.photos||{};
  }catch{properties=DEFAULT_PROPS;photos={};}
  renderAll();
}

async function saveToBin(){
  const payload={properties,photos};
  try{
    if(!BIN_ID){
      const r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY,'X-Bin-Name':'Olaves-Inventario','X-Bin-Private':'false'},body:JSON.stringify(payload)});
      const d=await r.json();BIN_ID=d.metadata?.id;
      if(BIN_ID)localStorage.setItem('olaves_bin_id',BIN_ID);
    }else{
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY},body:JSON.stringify(payload)});
    }
    toast('✓ Guardado en la nube');
  }catch{toast('Sin conexión — cambios locales guardados');localStorage.setItem('olaves_local',JSON.stringify(payload));}
}

function renderAll(){updateStats();renderGrid();}

function updateStats(){
  const a=properties.filter(p=>p.status!=='sold').length;
  const s=properties.filter(p=>p.status==='sold').length;
  document.getElementById('stat-total').textContent=properties.length;
  document.getElementById('stat-available').textContent=a;
  document.getElementById('stat-sold').textContent=s;
}

function renderGrid(){
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const grid=document.getElementById('catalog-grid');
  let list=properties;
  if(currentFilter==='available')list=list.filter(p=>p.status!=='sold');
  if(currentFilter==='sold')list=list.filter(p=>p.status==='sold');
  if(currentFilter==='new')list=list.filter(p=>p.isNew&&p.status!=='sold');
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.location||'').toLowerCase().includes(q));
  if(!list.length){grid.innerHTML='<div class="empty-state"><p>No se encontraron propiedades</p></div>';return;}
  grid.innerHTML=list.map((p,i)=>cardHTML(p,i)).join('');
}

function cardHTML(p,i){
  const imgs=photos[p.id]||[];
  const imgEl=imgs.length?`<img src="${imgs[0]}" alt="${escHtml(p.name)}" loading="lazy">`:`<div class="no-photo"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Sin foto</span></div>`;
  const isSold=p.status==='sold';const isNew=p.isNew&&!isSold;
  const tags=[p.beds?`${p.beds} Rec.`:null,p.baths?`${p.baths} Baños`:null,p.sqm?p.sqm:null,p.payment?p.payment.split(',')[0]:null].filter(Boolean).map(t=>`<span class="spec-tag">${t}</span>`).join('');
  const footer=isSold?`<span class="sold-info">Vendida${p.buyer?` — ${escHtml(p.buyer)}`:''}${p.dateSold?` (${fmtDate(p.dateSold)})`:''}</span>`:(p.commission?`<span class="commission-badge">Comisión ${escHtml(p.commission)}</span>`:'<span></span>');
  const dateLabel=p.dateIn?`<span>Ingreso: ${fmtDate(p.dateIn)}</span>`:'<span></span>';
  return `<div class="prop-card${isSold?' sold':''}${isNew?' new-prop':''}" style="animation-delay:${i*.04}s" onclick="openDetail('${p.id}')">
    <div class="card-img-wrap">${imgEl}</div>
    <div class="card-body">
      <div class="card-top"><div class="card-title">${escHtml(p.name)}</div><div class="card-price">${escHtml(p.price)}</div></div>
      <div class="card-location">${escHtml(p.location||'')}</div>
      <div class="card-specs">${tags}</div>
      ${p.notes?`<div style="font-size:10px;color:var(--grey);margin-bottom:6px;line-height:1.5;">${escHtml(p.notes)}</div>`:''}
      <div class="card-footer">${dateLabel}${footer}</div>
      <div class="card-view-more"><span>▸ Ver detalle</span></div>
    </div>
  </div>`;
}

// ── DETAIL MODAL ──
function openDetail(id){
  const p=properties.find(x=>x.id===id);if(!p)return;
  currentDetailId=id; detailImgIdx=0;
  const overlay=document.getElementById('detail-overlay');
  overlay.style.display='flex';
  renderDetailImages(p);
  renderDetailBody(p);
}

function renderDetailImages(p){
  const imgs=photos[p.id]||[];
  const strip=document.getElementById('detail-imgs');
  // Clear previous images except close button and nav
  const closeBtn=strip.querySelector('.detail-close');
  const nav=strip.querySelector('.detail-nav');
  strip.innerHTML='';
  strip.appendChild(closeBtn);

  if(imgs.length){
    const img=document.createElement('img');
    img.src=imgs[detailImgIdx];
    img.style.cssText='width:100%;height:100%;object-fit:cover;';
    strip.insertBefore(img,closeBtn);
    if(imgs.length>1){
      nav.innerHTML=imgs.map((_,i)=>`<button class="detail-dot${i===detailImgIdx?' active':''}" onclick="goDetailImg(${i})"></button>`).join('');
      strip.appendChild(nav);
    }
  } else {
    const ph=document.createElement('div');
    ph.style.cssText='width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);flex-direction:column;gap:8px;';
    ph.innerHTML='<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;">Sin foto</span>';
    strip.insertBefore(ph,closeBtn);
  }
}

function goDetailImg(i){
  const p=properties.find(x=>x.id===currentDetailId);if(!p)return;
  detailImgIdx=i;
  renderDetailImages(p);
}

function renderDetailBody(p){
  const isSold=p.status==='sold';
  const specs=[
    p.beds?`🛏 ${p.beds} Recámaras`:null,
    p.baths?`🚿 ${p.baths} Baños`:null,
    p.sqm?`📐 ${p.sqm}`:null,
    p.payment?`💳 ${p.payment}`:null,
  ].filter(Boolean).map(s=>`<span class="detail-spec">${s}</span>`).join('');

  const recomendadoSection = p.recomendado
    ? `<div class="detail-section">
        <div class="detail-section-title">📋 Texto Recomendado</div>
        <div class="detail-recomendado">${escHtml(p.recomendado)}</div>
       </div>`
    : '';

  const notesSection = p.notes
    ? `<div class="detail-section">
        <div class="detail-section-title">Características</div>
        <p>${escHtml(p.notes)}</p>
       </div>`
    : '';

  const commSection = p.commission && !isSold
    ? `<div class="detail-section">
        <div class="detail-section-title">Comisión</div>
        <p style="font-size:15px;font-weight:600;color:var(--indigo);">${escHtml(p.commission)}</p>
       </div>`
    : '';

  const soldSection = isSold
    ? `<div style="background:rgba(176,48,48,.07);border-left:4px solid var(--red);border-radius:0 4px 4px 0;padding:12px 16px;margin-bottom:16px;">
        <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:4px;">Vendida</div>
        <div style="font-size:12px;color:#555;">${p.buyer?`Comprador(a): <strong>${escHtml(p.buyer)}</strong>`:''}${p.dateSold?` &mdash; ${fmtDate(p.dateSold)}`:''}</div>
       </div>`
    : '';

  document.getElementById('detail-body').innerHTML = `
    <div class="${isSold?'detail-sold':''}">
      ${soldSection}
      <div class="detail-header">
        <div class="detail-title">${escHtml(p.name)}</div>
        <div class="detail-price">${escHtml(p.price)}</div>
      </div>
      <div class="detail-location">${escHtml(p.location||'')}</div>
      ${specs?`<div class="detail-specs">${specs}</div>`:''}
      ${recomendadoSection}
      ${notesSection}
      ${commSection}
      <div class="detail-meta">
        ${p.dateIn?`<div class="detail-meta-item"><strong>Fecha de Ingreso</strong>${fmtDate(p.dateIn)}</div>`:''}
        ${isSold&&p.dateSold?`<div class="detail-meta-item"><strong>Fecha de Venta</strong>${fmtDate(p.dateSold)}</div>`:''}
        ${p.isNew&&!isSold?`<div class="detail-meta-item"><strong style="color:var(--green);">🆕 Nueva</strong>Recién agregada</div>`:''}
      </div>
    </div>`;
}

function closeDetail(){
  document.getElementById('detail-overlay').style.display='none';
}

document.getElementById('detail-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('detail-overlay'))closeDetail();
});

document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeDetail(); });

// ── ADD PROPERTY ──
function addProperty(){
  const name=document.getElementById('f-name').value.trim();
  const price=document.getElementById('f-price').value.trim();
  if(!name||!price){toast('⚠ Nombre y precio son obligatorios');return;}
  const id='p'+Date.now();
  const isNew=document.getElementById('f-isnew').checked;
  properties.unshift({
    id,name,price,
    location:document.getElementById('f-location').value.trim(),
    beds:document.getElementById('f-beds').value.trim(),
    baths:document.getElementById('f-baths').value.trim(),
    sqm:document.getElementById('f-sqm').value.trim(),
    commission:document.getElementById('f-commission').value.trim(),
    payment:document.getElementById('f-payment').value.trim(),
    notes:document.getElementById('f-notes').value.trim(),
    recomendado:document.getElementById('f-recomendado').value.trim(),
    status:'available',isNew,
    dateIn:document.getElementById('f-date').value||new Date().toISOString().slice(0,10),
    dateSold:'',buyer:''
  });
  if(pendingPhotos.length)photos[id]=pendingPhotos.slice();
  ['f-name','f-price','f-location','f-beds','f-baths','f-sqm','f-commission','f-payment','f-notes','f-recomendado'].forEach(x=>{const el=document.getElementById(x);if(el)el.value='';});
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('f-isnew').checked=true;
  pendingPhotos=[];renderPreviews();
  saveToBin();renderAll();toast(`✓ "${name}" agregada`);
}

// ── PHOTO UPLOAD ──
function initPhotoUpload(){
  const input=document.getElementById('photo-input');
  const drop=document.getElementById('photo-drop');
  input.addEventListener('change',e=>handleFiles(e.target.files));
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('dragover');});
  drop.addEventListener('dragleave',()=>drop.classList.remove('dragover'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('dragover');handleFiles(e.dataTransfer.files);});
}
function handleFiles(files){
  Array.from(files).slice(0,5-pendingPhotos.length).forEach(f=>{
    if(!f.type.startsWith('image/'))return;
    const r=new FileReader();
    r.onload=e=>{pendingPhotos.push(e.target.result);renderPreviews();};
    r.readAsDataURL(f);
  });
}
function renderPreviews(){
  document.getElementById('photo-preview').innerHTML=pendingPhotos.map((s,i)=>`<div class="photo-thumb"><img src="${s}"><button class="remove-photo" onclick="removePhoto(${i})">×</button></div>`).join('');
}
function removePhoto(i){pendingPhotos.splice(i,1);renderPreviews();}

// ── ADMIN LIST ──
function renderAdminList(){
  const el=document.getElementById('admin-prop-list');
  if(!properties.length){el.innerHTML='<p style="color:var(--grey);font-size:13px;">Sin propiedades.</p>';return;}
  el.innerHTML=properties.map(p=>{
    const img=(photos[p.id]||[])[0];const isSold=p.status==='sold';const dot=isSold?'sold':(p.isNew?'new':'available');
    return`<div class="prop-list-item${isSold?' sold':''}">
      ${img?`<img class="prop-list-thumb" src="${img}" alt="">`:`<div class="prop-list-thumb" style="display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-size:16px;">🏠</div>`}
      <div class="prop-list-info"><div class="prop-list-name">${escHtml(p.name)}</div><div class="prop-list-price">${escHtml(p.price)}${p.buyer?` — ${escHtml(p.buyer)}`:''}</div></div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
        <span class="status-dot ${dot}"></span>
        <span style="font-size:9px;color:var(--grey);">${isSold?'Vendida':(p.isNew?'Nueva':'Disp.')}</span>
      </div>
      <div class="prop-list-actions">
        <button class="btn-secondary" onclick="toggleNew('${p.id}')" title="${p.isNew?'Quitar etiqueta Nueva':'Marcar como Nueva'}">${p.isNew?'⬜ Normal':'🆕 Nueva'}</button>
        ${!isSold?`<button class="btn-secondary" onclick="openSell('${p.id}')">Vendida</button>`:`<button class="btn-secondary" onclick="reactivate('${p.id}')">Reactivar</button>`}
        <button class="btn-danger" onclick="deleteProperty('${p.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function toggleNew(id){
  const p=properties.find(x=>x.id===id);if(!p)return;
  p.isNew=!p.isNew;
  saveToBin();renderAll();renderAdminList();
  toast(p.isNew?'✓ Marcada como Nueva':'✓ Etiqueta removida');
}

// ── SELL / REACTIVATE / DELETE ──
function openSell(id){sellTargetId=id;document.getElementById('buyer-name').value='';document.getElementById('sell-date').value=new Date().toISOString().slice(0,10);document.getElementById('sell-modal').style.display='flex';}
function confirmSell(){const p=properties.find(x=>x.id===sellTargetId);if(p){p.status='sold';p.isNew=false;p.buyer=document.getElementById('buyer-name').value.trim();p.dateSold=document.getElementById('sell-date').value;}document.getElementById('sell-modal').style.display='none';saveToBin();renderAll();toast('✓ Propiedad marcada como vendida');}
function reactivate(id){const p=properties.find(x=>x.id===id);if(p){p.status='available';p.buyer='';p.dateSold='';}saveToBin();renderAll();toast('✓ Propiedad reactivada');}
function deleteProperty(id){if(!confirm('¿Eliminar esta propiedad permanentemente?'))return;properties=properties.filter(x=>x.id!==id);delete photos[id];saveToBin();renderAll();renderAdminList();toast('✓ Propiedad eliminada');}

// ── ADMIN PANEL ──
let logoClicks=0,logoTimer;
document.getElementById('logo-trigger').addEventListener('click',()=>{logoClicks++;clearTimeout(logoTimer);logoTimer=setTimeout(()=>logoClicks=0,1500);if(logoClicks>=3){logoClicks=0;const ov=document.getElementById('admin-overlay');ov.style.display='flex';document.getElementById('admin-login').style.display='flex';document.getElementById('admin-dashboard').style.display='none';document.getElementById('admin-pwd').value='';document.getElementById('login-error').style.display='none';setTimeout(()=>document.getElementById('admin-pwd').focus(),200);}});
document.getElementById('admin-close').addEventListener('click',()=>{document.getElementById('admin-overlay').style.display='none';});
document.getElementById('admin-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('admin-overlay'))document.getElementById('admin-overlay').style.display='none';});
document.getElementById('admin-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin();});
function adminLogin(){if(document.getElementById('admin-pwd').value===ADMIN_PWD){document.getElementById('admin-login').style.display='none';document.getElementById('admin-dashboard').style.display='flex';document.getElementById('f-date').value=new Date().toISOString().slice(0,10);renderAdminList();}else{document.getElementById('login-error').style.display='block';document.getElementById('admin-pwd').value='';}}

document.querySelectorAll('.admin-tab').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const tab=btn.dataset.tab;document.getElementById('tab-add').style.display=tab==='add'?'block':'none';document.getElementById('tab-list').style.display=tab==='list'?'block':'none';if(tab==='list')renderAdminList();});});
document.querySelectorAll('.filter-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFilter=btn.dataset.filter;renderGrid();});});
document.getElementById('search-input').addEventListener('input',renderGrid);

function fmtDate(d){if(!d)return'';const[y,m,dy]=d.split('-');const ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return`${parseInt(dy)} ${ms[parseInt(m)-1]} ${y}`;}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}

document.addEventListener('DOMContentLoaded',()=>{initPhotoUpload();loadFromBin();});
</script>
